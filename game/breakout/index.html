<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打砖块 Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 640px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: #ccc;
    font-size: 15px;
  }
  .hud .score { color: #ffd700; font-weight: bold; font-size: 18px; }
  .hud .lives { color: #ff6b6b; letter-spacing: 2px; }
  .hud .level { color: #4ecdc4; font-weight: bold; }
  canvas {
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    display: block;
    cursor: none;
    background: #0f0f2a;
  }
  .overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #fff;
    pointer-events: none;
  }
  .overlay h1 {
    font-size: 42px;
    text-shadow: 0 0 30px rgba(78,205,196,0.6);
    letter-spacing: 4px;
  }
  .overlay h2 {
    font-size: 28px;
    color: #ff6b6b;
    text-shadow: 0 0 20px rgba(255,107,107,0.5);
  }
  .overlay p {
    font-size: 16px;
    color: #aaa;
  }
  .overlay .start-hint {
    font-size: 18px;
    color: #4ecdc4;
    animation: blink 1.2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="hud">
    <span>得分: <span class="score" id="score">0</span></span>
    <span class="level" id="level">第 1 关</span>
    <span class="lives" id="lives">♥♥♥</span>
  </div>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div class="overlay" id="overlay"></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ── HUD ──
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');

function updateHUD() {
  scoreEl.textContent = game.score;
  levelEl.textContent = `第 ${game.level} 关`;
  livesEl.textContent = '♥'.repeat(game.lives) + '♡'.repeat(3 - game.lives);
}

// ── 粒子系统 ──
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 2;
    this.life = 1;
    this.decay = 0.015 + Math.random() * 0.025;
    this.size = 2 + Math.random() * 4;
    this.gravity = 0.08;
  }
  update() {
    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    this.life -= this.decay;
    this.size *= 0.98;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

let particles = [];

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ── 砖块颜色与分值 ──
// 行索引从上到下，颜色由深到浅，分值由高到低
const BRICK_COLORS = [
  { fill: '#ff6b6b', stroke: '#c0392b', score: 50 },  // 红
  { fill: '#ffa502', stroke: '#d68910', score: 40 },  // 橙
  { fill: '#ffd700', stroke: '#b8960f', score: 30 },  // 黄
  { fill: '#2ed573', stroke: '#1e9c4f', score: 20 },  // 绿
  { fill: '#4ecdc4', stroke: '#2ea89f', score: 10 },  // 青
  { fill: '#70a1ff', stroke: '#4a81d4', score: 10 },  // 蓝
];

// ── 关卡设计 ──
// 每个关卡是一个二维数组，1 = 砖块，0 = 空
// 用函数生成不同布局
function generateLevel(level) {
  const cols = 10;
  const bricks = [];

  switch (level) {
    case 1: {
      // 经典满排
      for (let r = 0; r < 5; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) row.push(1);
        bricks.push(row);
      }
      break;
    }
    case 2: {
      // 棋盘格
      for (let r = 0; r < 6; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) row.push((r + c) % 2 === 0 ? 1 : 0);
        bricks.push(row);
      }
      break;
    }
    case 3: {
      // 金字塔
      for (let r = 0; r < 6; r++) {
        const row = [];
        const pad = r;
        for (let c = 0; c < cols; c++) {
          row.push(c >= pad && c < cols - pad ? 1 : 0);
        }
        bricks.push(row);
      }
      break;
    }
    case 4: {
      // 菱形
      const center = cols / 2;
      for (let r = 0; r < 7; r++) {
        const row = [];
        const dist = r < 4 ? r : 6 - r;
        for (let c = 0; c < cols; c++) {
          row.push(Math.abs(c - center + 0.5) <= dist + 0.5 ? 1 : 0);
        }
        bricks.push(row);
      }
      break;
    }
    case 5: {
      // 交错行 + 加厚
      for (let r = 0; r < 7; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) {
          if (r % 2 === 0) row.push(1);
          else row.push(c % 3 === 1 ? 0 : 1);
        }
        bricks.push(row);
      }
      break;
    }
    default: {
      // 随机生成
      const rows = 5 + Math.min(level, 5);
      for (let r = 0; r < rows; r++) {
        const row = [];
        for (let c = 0; c < cols; c++) {
          row.push(Math.random() > 0.25 ? 1 : 0);
        }
        bricks.push(row);
      }
    }
  }
  return bricks;
}

// ── 砖块对象 ──
class Brick {
  constructor(x, y, w, h, colorIdx) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.h = h;
    this.colorIdx = colorIdx % BRICK_COLORS.length;
    this.alive = true;
  }
  get color() { return BRICK_COLORS[this.colorIdx]; }
  draw() {
    if (!this.alive) return;
    const c = this.color;
    ctx.fillStyle = c.fill;
    ctx.strokeStyle = c.stroke;
    ctx.lineWidth = 1;
    const r = 3;
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.w, this.h, r);
    ctx.fill();
    ctx.stroke();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(this.x + 2, this.y + 1, this.w - 4, this.h / 3);
  }
}

// ── 挡板 ──
const paddle = {
  w: 100, h: 14, x: 0, y: 0, speed: 0,
  init() {
    this.x = (W - this.w) / 2;
    this.y = H - 36;
    this.speed = 0;
  },
  draw() {
    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.h);
    grad.addColorStop(0, '#4ecdc4');
    grad.addColorStop(1, '#2ea89f');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.w, this.h, 7);
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(this.x + 6, this.y + 2, this.w - 12, 4);
  }
};

// ── 球 ──
const ball = {
  x: 0, y: 0, r: 7, dx: 0, dy: 0,
  baseSpeed: 4.5,
  trail: [],
  init() {
    this.x = W / 2;
    this.y = paddle.y - this.r - 2;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    this.dx = Math.cos(angle) * this.baseSpeed;
    this.dy = Math.sin(angle) * this.baseSpeed;
    this.trail = [];
  },
  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();
    this.x += this.dx;
    this.y += this.dy;
  },
  draw() {
    // 拖尾
    this.trail.forEach((p, i) => {
      const alpha = (i / this.trail.length) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#4ecdc4';
      ctx.beginPath();
      ctx.arc(p.x, p.y, this.r * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    // 球体
    const grad = ctx.createRadialGradient(this.x - 2, this.y - 2, 1, this.x, this.y, this.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.5, '#4ecdc4');
    grad.addColorStop(1, '#2ea89f');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
};

// ── 游戏状态 ──
const game = {
  state: 'start',  // start | playing | paused | gameover | levelup | win
  score: 0,
  lives: 3,
  level: 1,
  maxLevel: 6,
  bricks: [],
};

function loadLevel(lvl) {
  game.bricks = [];
  const layout = generateLevel(lvl);
  const brickW = 58;
  const brickH = 20;
  const gap = 4;
  const offsetX = (W - (layout[0].length * (brickW + gap) - gap)) / 2;
  const offsetY = 40;

  layout.forEach((row, r) => {
    row.forEach((cell, c) => {
      if (cell) {
        const x = offsetX + c * (brickW + gap);
        const y = offsetY + r * (brickH + gap);
        game.bricks.push(new Brick(x, y, brickW, brickH, r));
      }
    });
  });
}

function resetGame() {
  game.score = 0;
  game.lives = 3;
  game.level = 1;
  loadLevel(1);
  paddle.init();
  ball.init();
  particles = [];
  updateHUD();
}

function nextLevel() {
  game.level++;
  if (game.level > game.maxLevel) {
    game.state = 'win';
    showOverlay('win');
    return;
  }
  loadLevel(game.level);
  paddle.init();
  ball.init();
  particles = [];
  game.state = 'playing';
  updateHUD();
}

// ── 碰撞检测 ──
function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function ballBrickCollision(brick) {
  // AABB vs circle
  const cx = clamp(ball.x, brick.x, brick.x + brick.w);
  const cy = clamp(ball.y, brick.y, brick.y + brick.h);
  const dx = ball.x - cx;
  const dy = ball.y - cy;
  return dx * dx + dy * dy <= ball.r * ball.r;
}

function resolveBrickCollision(brick) {
  // 判断从哪个方向碰撞
  const bCX = brick.x + brick.w / 2;
  const bCY = brick.y + brick.h / 2;
  const diffX = ball.x - bCX;
  const diffY = ball.y - bCY;
  const halfW = brick.w / 2 + ball.r;
  const halfH = brick.h / 2 + ball.r;

  const overlapX = halfW - Math.abs(diffX);
  const overlapY = halfH - Math.abs(diffY);

  if (overlapX < overlapY) {
    ball.dx = Math.abs(ball.dx) * Math.sign(diffX);
    ball.x += overlapX * Math.sign(diffX);
  } else {
    ball.dy = Math.abs(ball.dy) * Math.sign(diffY);
    ball.y += overlapY * Math.sign(diffY);
  }
}

// ── 更新逻辑 ──
function update() {
  if (game.state !== 'playing') return;

  ball.update();

  // 墙壁碰撞
  if (ball.x - ball.r <= 0) {
    ball.x = ball.r;
    ball.dx = Math.abs(ball.dx);
  }
  if (ball.x + ball.r >= W) {
    ball.x = W - ball.r;
    ball.dx = -Math.abs(ball.dx);
  }
  if (ball.y - ball.r <= 0) {
    ball.y = ball.r;
    ball.dy = Math.abs(ball.dy);
  }

  // 球掉落底部
  if (ball.y - ball.r > H) {
    game.lives--;
    updateHUD();
    if (game.lives <= 0) {
      game.state = 'gameover';
      showOverlay('gameover');
    } else {
      paddle.init();
      ball.init();
    }
    return;
  }

  // 挡板碰撞
  if (
    ball.dy > 0 &&
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + 4 &&
    ball.x >= paddle.x &&
    ball.x <= paddle.x + paddle.w
  ) {
    // 根据击中挡板的位置改变角度
    const hitPos = (ball.x - paddle.x) / paddle.w; // 0~1
    const angle = -Math.PI / 2 + (hitPos - 0.5) * (Math.PI * 0.7); // ±63°
    const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
    ball.dx = Math.cos(angle) * speed;
    ball.dy = Math.sin(angle) * speed;
    // 确保球向上
    if (ball.dy > 0) ball.dy = -ball.dy;
    ball.y = paddle.y - ball.r - 1;
    spawnParticles(ball.x, ball.y, '#4ecdc4', 5);
  }

  // 砖块碰撞
  for (const brick of game.bricks) {
    if (!brick.alive) continue;
    if (ballBrickCollision(brick)) {
      brick.alive = false;
      resolveBrickCollision(brick);
      game.score += brick.color.score;
      spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, brick.color.fill, 15);
      updateHUD();
      break; // 每帧只碰一个砖块
    }
  }

  // 检查是否通关
  if (game.bricks.every(b => !b.alive)) {
    game.state = 'levelup';
    showOverlay('levelup');
  }

  // 粒子更新
  particles.forEach(p => p.update());
  particles = particles.filter(p => p.life > 0);
}

// ── 绘制 ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // 砖块
  game.bricks.forEach(b => b.draw());

  // 粒子
  particles.forEach(p => p.draw());

  // 挡板
  paddle.draw();

  // 球（非 playing 状态也画）
  if (game.state === 'playing') {
    ball.draw();
  } else if (game.state === 'start' || game.state === 'paused') {
    ball.draw();
  }
}

// ── 覆盖层 ──
function showOverlay(type) {
  let html = '';
  switch (type) {
    case 'start':
      html = `
        <h1>BREAKOUT</h1>
        <p>鼠标/触摸控制挡板 | 不同颜色砖块分值不同</p>
        <p class="start-hint">点击开始游戏</p>`;
      break;
    case 'gameover':
      html = `
        <h2>GAME OVER</h2>
        <p>最终得分: ${game.score}</p>
        <p class="start-hint">点击重新开始</p>`;
      break;
    case 'levelup':
      html = `
        <h2 style="color:#4ecdc4">通关!</h2>
        <p>得分: ${game.score} | 准备进入第 ${game.level + 1 > game.maxLevel ? '??? ' : game.level + 1} 关</p>
        <p class="start-hint">点击继续</p>`;
      break;
    case 'win':
      html = `
        <h1 style="color:#ffd700">YOU WIN!</h1>
        <p>恭喜通关全部 ${game.maxLevel} 关!</p>
        <p>最终得分: ${game.score}</p>
        <p class="start-hint">点击重新开始</p>`;
      break;
  }
  overlay.innerHTML = html;
  overlay.style.pointerEvents = 'auto';
  // 定位覆盖到 canvas 上方
  const rect = canvas.getBoundingClientRect();
  overlay.style.left = rect.left + 'px';
  overlay.style.top = rect.top + 'px';
  overlay.style.width = rect.width + 'px';
  overlay.style.height = rect.height + 'px';
}

function hideOverlay() {
  overlay.innerHTML = '';
  overlay.style.pointerEvents = 'none';
}

// ── 主循环 ──
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── 输入处理 ──
let mouseX = W / 2;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  movePaddle();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
  movePaddle();
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
  movePaddle();
}, { passive: false });

function movePaddle() {
  paddle.x = clamp(mouseX - paddle.w / 2, 0, W - paddle.w);
}

// 点击事件
overlay.addEventListener('click', handleAction);
canvas.addEventListener('click', handleAction);

function handleAction() {
  switch (game.state) {
    case 'start':
      resetGame();
      game.state = 'playing';
      hideOverlay();
      break;
    case 'gameover':
    case 'win':
      game.state = 'start';
      resetGame();
      game.state = 'playing';
      hideOverlay();
      break;
    case 'levelup':
      hideOverlay();
      nextLevel();
      break;
  }
}

// 键盘支持
document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') {
    if (game.state === 'playing') {
      game.state = 'paused';
      showOverlay('paused');
    } else if (game.state === 'paused') {
      game.state = 'playing';
      hideOverlay();
    }
  }
  if (e.key === ' ') {
    e.preventDefault();
    handleAction();
  }
});

// ── 启动 ──
resetGame();
game.state = 'start';
showOverlay('start');
loop();
</script>
</body>
</html>
