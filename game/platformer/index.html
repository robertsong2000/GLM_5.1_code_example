<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平台跳跃冒险</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative;
    border: 3px solid #2a2a4a;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(80, 120, 255, 0.15);
  }
  canvas { display: block; border-radius: 5px; }

  #hud {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .hud-item {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hud-item span { margin-right: 4px; }
  #coinCount { color: #ffd700; }
  #levelDisplay { color: #7df9ff; }
  #livesDisplay { color: #ff6b6b; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    z-index: 20;
    backdrop-filter: blur(6px);
    border-radius: 5px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: 42px;
    color: #fff;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(100,150,255,0.5);
  }
  #overlay h2 {
    font-size: 28px;
    color: #ffd700;
    margin-bottom: 10px;
  }
  #overlay p {
    color: #aaa;
    font-size: 15px;
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.6;
  }
  #overlay .controls-info {
    color: #7df9ff;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.8;
  }
  .btn {
    padding: 12px 36px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
    margin: 5px;
  }
  .btn:hover { transform: scale(1.05); }
  .btn-primary {
    background: linear-gradient(135deg, #4f8eff, #6c5ce7);
    color: #fff;
    box-shadow: 0 4px 15px rgba(79,142,255,0.4);
  }
  .btn-primary:hover {
    box-shadow: 0 6px 25px rgba(79,142,255,0.6);
  }
  #mobileControls {
    display: none;
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    z-index: 15;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }
  .mobile-btn-group { display: flex; gap: 10px; pointer-events: auto; }
  .mobile-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .mobile-btn:active { background: rgba(255,255,255,0.35); }
  @media (max-width: 900px) {
    #mobileControls { display: flex; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-item"><span>🪙</span> <span id="coinCount">0</span></div>
    <div class="hud-item" id="levelDisplay">第 1 关</div>
    <div class="hud-item"><span>❤️</span> <span id="livesDisplay">3</span></div>
  </div>
  <div id="overlay">
    <h1>🌟 平台跳跃冒险</h1>
    <div class="controls-info">
      ← → 或 A D 移动 &nbsp;|&nbsp; 空格 / W / ↑ 跳跃<br>
      支持二段跳 &nbsp;|&nbsp; 收集金币，躲避尖刺，到达旗帜！
    </div>
    <p>3 个关卡，难度递增，你能通关吗？</p>
    <button class="btn btn-primary" id="startBtn">开始游戏</button>
  </div>
  <div id="mobileControls">
    <div class="mobile-btn-group">
      <button class="mobile-btn" id="btnLeft">◀</button>
      <button class="mobile-btn" id="btnRight">▶</button>
    </div>
    <div class="mobile-btn-group">
      <button class="mobile-btn" id="btnJump">▲</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 配置常量
// ============================================================
const CANVAS_W = 900;
const CANVAS_H = 520;
const TILE = 40;
const GRAVITY = 0.6;
const MAX_FALL = 12;
const MOVE_ACCEL = 0.8;
const MOVE_DECEL = 0.75;
const MAX_SPEED = 5.5;
const JUMP_FORCE = -11.5;
const DJUMP_FORCE = -10;
const PLAYER_W = 28;
const PLAYER_H = 36;
const COIN_R = 10;
const SPIKE_H = 24;

// ============================================================
// 全局状态
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

const container = document.getElementById('gameContainer');
container.style.width = CANVAS_W + 'px';
container.style.height = CANVAS_H + 'px';

let gameState = 'menu'; // menu, playing, dead, levelComplete, gameComplete
let currentLevel = 0;
let totalCoins = 0;
let lives = 3;
let deathTimer = 0;
let levelCompleteTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let particles = [];
let frameCount = 0;

// 输入
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// 移动端控制
const mobileKeys = { left: false, right: false, jump: false };
function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  const start = () => { mobileKeys[key] = true; };
  const end = () => { mobileKeys[key] = false; };
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); });
  btn.addEventListener('touchend', e => { e.preventDefault(); end(); });
  btn.addEventListener('touchcancel', e => { e.preventDefault(); end(); });
}
setupMobileBtn('btnLeft', 'left');
setupMobileBtn('btnRight', 'right');
setupMobileBtn('btnJump', 'jump');

// ============================================================
// 音效系统 (Web Audio API)
// ============================================================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type='square', vol=0.12, slide=0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxJump() {
  playTone(350, 0.12, 'square', 0.1, 300);
}
function sfxDoubleJump() {
  playTone(500, 0.12, 'square', 0.1, 400);
}
function sfxCoin() {
  playTone(880, 0.08, 'square', 0.1);
  setTimeout(() => playTone(1320, 0.12, 'square', 0.1), 60);
}
function sfxDeath() {
  playTone(400, 0.15, 'sawtooth', 0.15, -200);
  setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.12, -100), 120);
}
function sfxLevelComplete() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'square', 0.1), i * 120));
}

// ============================================================
// 粒子系统
// ============================================================
function spawnParticles(x, y, color, count=8, speed=3) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(cam) {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cam.x - p.size/2, p.y - cam.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ============================================================
// 摄像机
// ============================================================
const camera = { x: 0, y: 0, targetX: 0, targetY: 0 };
function updateCamera(player, level) {
  camera.targetX = player.x + PLAYER_W/2 - CANVAS_W/2 + player.facing * 60;
  camera.targetY = player.y + PLAYER_H/2 - CANVAS_H * 0.55;
  // 边界限制
  camera.targetX = Math.max(0, Math.min(level.width - CANVAS_W, camera.targetX));
  camera.targetY = Math.max(0, Math.min(level.height - CANVAS_H, camera.targetY));
  // 平滑跟随
  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.06;
}

// ============================================================
// 角色
// ============================================================
function createPlayer(x, y) {
  return {
    x, y,
    vx: 0, vy: 0,
    onGround: false,
    jumpCount: 0,
    facing: 1,
    animFrame: 0,
    animTimer: 0,
    state: 'idle', // idle, run, jump, fall
    dead: false,
    invincible: 0,
    runDustTimer: 0
  };
}

function updatePlayer(player, level) {
  if (player.dead) return;

  // 输入
  const left = keys['ArrowLeft'] || keys['KeyA'] || mobileKeys.left;
  const right = keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right;
  const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mobileKeys.jump;

  // 水平移动
  if (left) {
    player.vx -= MOVE_ACCEL;
    player.facing = -1;
  } else if (right) {
    player.vx += MOVE_ACCEL;
    player.facing = 1;
  } else {
    player.vx *= MOVE_DECEL;
    if (Math.abs(player.vx) < 0.2) player.vx = 0;
  }
  player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));

  // 跳跃
  if (jumpPressed && !player.jumpHeld && player.jumpCount < 2) {
    if (player.jumpCount === 0) {
      player.vy = JUMP_FORCE;
      sfxJump();
    } else {
      player.vy = DJUMP_FORCE;
      sfxDoubleJump();
      spawnParticles(player.x + PLAYER_W/2, player.y + PLAYER_H, '#aaddff', 6, 2);
    }
    player.jumpCount++;
    player.onGround = false;
    player.jumpHeld = true;
  }
  if (!jumpPressed) player.jumpHeld = false;

  // 重力
  player.vy += GRAVITY;
  player.vy = Math.min(MAX_FALL, player.vy);

  // 先更新所有移动平台位置
  for (const plat of level.platforms) {
    if (plat.type === 'moving') {
      updateMovingPlatform(plat);
    }
  }

  // 移动X
  player.x += player.vx;
  // X碰撞检测
  for (const plat of level.platforms) {
    if (aabb(player, plat)) {
      if (player.vx > 0) player.x = plat.x - PLAYER_W;
      else if (player.vx < 0) player.x = plat.x + plat.w;
      player.vx = 0;
    }
  }

  // 移动Y
  player.y += player.vy;
  player.onGround = false;
  // Y碰撞检测
  for (const plat of level.platforms) {
    if (aabb(player, plat)) {
      if (player.vy > 0) {
        player.y = plat.y - PLAYER_H;
        player.vy = 0;
        player.onGround = true;
        player.jumpCount = 0;
        // 移动平台带动玩家
        if (plat.type === 'moving' && plat.dx) {
          player.x += plat.dx;
        }
      } else if (player.vy < 0) {
        player.y = plat.y + plat.h;
        player.vy = 0;
      }
    }
  }

  // 掉落死亡
  if (player.y > level.height + 100) {
    killPlayer(player);
    return;
  }

  // 尖刺碰撞
  for (const spike of level.spikes) {
    const spikeBox = { x: spike.x + 4, y: spike.y + (spike.h || SPIKE_H) * 0.3, w: spike.w - 8, h: (spike.h || SPIKE_H) * 0.7 };
    if (aabb(player, spikeBox)) {
      killPlayer(player);
      return;
    }
  }

  // 金币碰撞
  for (let i = level.coins.length - 1; i >= 0; i--) {
    const c = level.coins[i];
    if (c.collected) continue;
    const dist = Math.hypot((player.x + PLAYER_W/2) - c.x, (player.y + PLAYER_H/2) - c.y);
    if (dist < COIN_R + 16) {
      c.collected = true;
      totalCoins++;
      sfxCoin();
      spawnParticles(c.x, c.y, '#ffd700', 10, 4);
    }
  }

  // 终点旗帜碰撞
  const flag = level.flag;
  if (flag && aabb(player, { x: flag.x - 10, y: flag.y, w: 40, h: TILE * 3 })) {
    gameState = 'levelComplete';
    levelCompleteTimer = 0;
    sfxLevelComplete();
  }

  // 动画状态
  if (player.onGround) {
    if (Math.abs(player.vx) > 0.5) {
      player.state = 'run';
      player.animTimer++;
      if (player.animTimer > 6) {
        player.animTimer = 0;
        player.animFrame = (player.animFrame + 1) % 4;
      }
      // 跑步灰尘
      player.runDustTimer++;
      if (player.runDustTimer > 8) {
        player.runDustTimer = 0;
        spawnParticles(player.x + PLAYER_W/2, player.y + PLAYER_H, 'rgba(200,200,200,0.5)', 1, 1);
      }
    } else {
      player.state = 'idle';
      player.animFrame = 0;
    }
  } else {
    player.state = player.vy < 0 ? 'jump' : 'fall';
  }

  // 无敌闪烁
  if (player.invincible > 0) player.invincible--;
}

function killPlayer(player) {
  if (player.dead || player.invincible > 0) return;
  player.dead = true;
  gameState = 'dead';
  deathTimer = 0;
  lives--;
  sfxDeath();
  spawnParticles(player.x + PLAYER_W/2, player.y + PLAYER_H/2, '#ff4444', 20, 5);
  shakeTimer = 15;
  shakeIntensity = 6;
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + PLAYER_W > b.x &&
         a.y < b.y + b.h && a.y + PLAYER_H > b.y;
}

function updateMovingPlatform(plat) {
  if (plat.moveAxis === 'x') {
    plat.x += plat.speed * plat.dir;
    plat.dx = plat.speed * plat.dir;
    if (plat.x <= plat.minVal || plat.x >= plat.maxVal) {
      plat.dir *= -1;
    }
  } else {
    plat.y += plat.speed * plat.dir;
    plat.dy = plat.speed * plat.dir;
    if (plat.y <= plat.minVal || plat.y >= plat.maxVal) {
      plat.dir *= -1;
    }
  }
}

// ============================================================
// 绘制角色
// ============================================================
function drawPlayer(player, cam) {
  const sx = player.x - cam.x;
  const sy = player.y - cam.y;

  if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2) return;

  ctx.save();
  ctx.translate(sx + PLAYER_W/2, sy + PLAYER_H/2);
  ctx.scale(player.facing, 1);

  // 身体
  const bodyColor = '#4f8eff';
  const skinColor = '#ffd5a0';
  const outlineColor = '#2a3a6a';

  // 腿部动画偏移
  let legOffset = 0;
  if (player.state === 'run') {
    legOffset = Math.sin(player.animFrame * Math.PI / 2) * 5;
  }
  let jumpSquash = 0;
  if (player.state === 'jump') jumpSquash = -2;
  if (player.state === 'fall') jumpSquash = 2;

  // 腿
  ctx.fillStyle = '#3a5aaa';
  ctx.fillRect(-8, 8 + jumpSquash, 6, 10 - jumpSquash/2);
  ctx.fillRect(2, 8 + jumpSquash + legOffset * 0.5, 6, 10 - jumpSquash/2);

  // 鞋子
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(-9, 16 + jumpSquash, 8, 4);
  ctx.fillRect(1, 16 + jumpSquash + legOffset * 0.3, 8, 4);

  // 身体
  ctx.fillStyle = bodyColor;
  roundRect(ctx, -10, -6 + jumpSquash/2, 20, 16, 3);
  ctx.fill();
  ctx.strokeStyle = outlineColor;
  ctx.lineWidth = 1;
  ctx.stroke();

  // 手臂
  const armSwing = player.state === 'run' ? legOffset * 0.6 : 0;
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-13, -2 + armSwing, 5, 10);
  ctx.fillRect(8, -2 - armSwing, 5, 10);

  // 头
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(0, -12, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = outlineColor;
  ctx.lineWidth = 1;
  ctx.stroke();

  // 帽子
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.ellipse(0, -18, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c0392b';
  ctx.fillRect(-6, -22, 12, 6);
  ctx.strokeStyle = outlineColor;
  ctx.lineWidth = 0.8;
  ctx.strokeRect(-6, -22, 12, 6);

  // 眼睛
  ctx.fillStyle = '#fff';
  ctx.fillRect(2, -14, 5, 5);
  ctx.fillStyle = '#222';
  ctx.fillRect(4, -13, 3, 3);

  // 嘴巴
  if (player.state === 'jump') {
    ctx.fillStyle = '#c0392b';
    ctx.beginPath();
    ctx.arc(3, -7, 2.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(2, -7, 4, 1.5);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// 关卡绘制
// ============================================================
function drawBackground(cam, level) {
  // 天空渐变
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  const colors = level.bgColors || ['#1a1a2e', '#16213e', '#0f3460'];
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(0.5, colors[1]);
  grad.addColorStop(1, colors[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 视差背景 - 山
  ctx.fillStyle = 'rgba(20,30,60,0.6)';
  const parX = -cam.x * 0.15;
  for (let i = 0; i < 15; i++) {
    const mx = i * 160 + parX % 160 - 80;
    const mh = 80 + Math.sin(i * 2.3) * 40;
    ctx.beginPath();
    ctx.moveTo(mx, CANVAS_H);
    ctx.lineTo(mx + 80, CANVAS_H - mh);
    ctx.lineTo(mx + 160, CANVAS_H);
    ctx.fill();
  }

  // 视差背景 - 云
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  for (let i = 0; i < 10; i++) {
    const cx = i * 250 + (-cam.x * 0.05 + i * 37) % (CANVAS_W + 200) - 100;
    const cy = 40 + Math.sin(i * 1.7) * 30;
    drawCloud(cx, cy, 40 + i * 5);
  }

  // 星星
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5 + frameCount * 0.01) % CANVAS_W;
    const sy = (i * 89.3) % (CANVAS_H * 0.4);
    const ss = 1 + Math.sin(frameCount * 0.05 + i) * 0.5;
    ctx.fillRect(sx, sy, ss, ss);
  }
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
  ctx.arc(x + size * 0.3, y - size * 0.15, size * 0.4, 0, Math.PI * 2);
  ctx.arc(x + size * 0.6, y, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlatform(plat, cam) {
  const x = plat.x - cam.x;
  const y = plat.y - cam.y;
  if (x + plat.w < -50 || x > CANVAS_W + 50) return;

  if (plat.type === 'moving') {
    // 移动平台 - 特殊颜色
    const g = ctx.createLinearGradient(x, y, x, y + plat.h);
    g.addColorStop(0, '#b07cfc');
    g.addColorStop(1, '#7c4dff');
    ctx.fillStyle = g;
    roundRect(ctx, x, y, plat.w, plat.h, 4);
    ctx.fill();
    // 发光
    ctx.shadowColor = '#7c4dff';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#d4b5ff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 箭头指示
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const cx = x + plat.w/2;
    const cy = y + plat.h/2;
    if (plat.moveAxis === 'x') {
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy); ctx.lineTo(cx - 3, cy - 3); ctx.lineTo(cx - 3, cy + 3); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 8, cy); ctx.lineTo(cx + 3, cy - 3); ctx.lineTo(cx + 3, cy + 3); ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx, cy - 5); ctx.lineTo(cx - 3, cy); ctx.lineTo(cx + 3, cy); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx, cy + 5); ctx.lineTo(cx - 3, cy); ctx.lineTo(cx + 3, cy); ctx.fill();
    }
  } else {
    // 普通平台 - 砖块样式
    const g = ctx.createLinearGradient(x, y, x, y + plat.h);
    g.addColorStop(0, '#5a7a5a');
    g.addColorStop(0.3, '#4a6a4a');
    g.addColorStop(1, '#3a5a3a');
    ctx.fillStyle = g;
    ctx.fillRect(x, y, plat.w, plat.h);
    // 砖块纹理
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    for (let bx = x; bx < x + plat.w; bx += TILE) {
      for (let by = y; by < y + plat.h; by += TILE/2) {
        const offset = (Math.floor((by - y) / (TILE/2)) % 2) * (TILE/2);
        ctx.strokeRect(bx + offset, by, TILE, TILE/2);
      }
    }
    // 顶部草地
    ctx.fillStyle = '#6abf4b';
    ctx.fillRect(x, y, plat.w, 4);
    ctx.fillStyle = '#5aaf3b';
    ctx.fillRect(x, y + 4, plat.w, 2);
  }
}

function drawSpike(spike, cam) {
  const x = spike.x - cam.x;
  const y = spike.y - cam.y;
  const w = spike.w;
  const h = spike.h || SPIKE_H;
  const count = Math.floor(w / 16);

  for (let i = 0; i < count; i++) {
    const sx = x + i * (w / count);
    const sw = w / count;
    // 尖刺三角
    const g = ctx.createLinearGradient(sx, y, sx, y + h);
    g.addColorStop(0, '#ff4444');
    g.addColorStop(1, '#cc2222');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(sx + sw/2, y);
    ctx.lineTo(sx + sw - 2, y + h);
    ctx.lineTo(sx + 2, y + h);
    ctx.closePath();
    ctx.fill();
    // 高光
    ctx.fillStyle = 'rgba(255,150,150,0.4)';
    ctx.beginPath();
    ctx.moveTo(sx + sw/2, y + 3);
    ctx.lineTo(sx + sw/2 + 2, y + h * 0.6);
    ctx.lineTo(sx + sw/2 - 1, y + h * 0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function drawCoin(coin, cam) {
  if (coin.collected) return;
  const x = coin.x - cam.x;
  const y = coin.y - cam.y + Math.sin(frameCount * 0.06 + coin.x) * 3;

  // 发光
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;

  // 硬币主体
  const scaleX = Math.cos(frameCount * 0.08 + coin.x * 0.01);
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(Math.abs(scaleX) * 0.8 + 0.2, 1);

  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(0, 0, COIN_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffed4a';
  ctx.beginPath();
  ctx.arc(-1, -1, COIN_R * 0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 1);

  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawFlag(flag, cam) {
  if (!flag) return;
  const x = flag.x - cam.x;
  const y = flag.y - cam.y;

  // 旗杆
  ctx.fillStyle = '#bbb';
  ctx.fillRect(x, y, 4, TILE * 3);

  // 旗帜（飘动动画）
  const wave = Math.sin(frameCount * 0.05) * 3;
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 5);
  ctx.quadraticCurveTo(x + 22 + wave, y + 15, x + 30 + wave, y + 20);
  ctx.lineTo(x + 4, y + 35);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ff8888';
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 5);
  ctx.quadraticCurveTo(x + 18 + wave * 0.5, y + 12, x + 25 + wave, y + 18);
  ctx.lineTo(x + 4, y + 30);
  ctx.closePath();
  ctx.fill();

  // 顶部球
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(x + 2, y - 2, 5, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// 关卡加载
// ============================================================
let levels = createLevels();
let currentLevelData = null;
let player = null;

function loadLevel(index) {
  currentLevel = index;
  currentLevelData = JSON.parse(JSON.stringify(levels[index]));
  // 恢复移动平台属性
  currentLevelData.platforms.forEach((p, i) => {
    const orig = levels[index].platforms[i];
    if (p.type === 'moving') {
      p.speed = orig.speed;
      p.dir = orig.dir;
      p.minVal = orig.minVal;
      p.maxVal = orig.maxVal;
      p.moveAxis = orig.moveAxis;
    }
  });
  player = createPlayer(currentLevelData.playerStart.x, currentLevelData.playerStart.y);
  camera.x = Math.max(0, player.x - CANVAS_W/2);
  camera.y = Math.max(0, player.y - CANVAS_H * 0.55);
  camera.targetX = camera.x;
  camera.targetY = camera.y;
  particles = [];
  updateHUD();
}

function updateHUD() {
  document.getElementById('coinCount').textContent = totalCoins;
  document.getElementById('levelDisplay').textContent = `第 ${currentLevel + 1} 关`;
  document.getElementById('livesDisplay').textContent = lives;
}

// ============================================================
// 叠加层管理
// ============================================================
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

function showOverlay(title, subtitle, btnText, btnAction) {
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>${title}</h1>
    ${subtitle ? `<h2>${subtitle}</h2>` : ''}
    <button class="btn btn-primary" id="overlayBtn">${btnText}</button>
  `;
  document.getElementById('overlayBtn').addEventListener('click', btnAction);
}

function hideOverlay() {
  overlay.classList.add('hidden');
}

startBtn.addEventListener('click', () => {
  initAudio();
  startGame();
});

function startGame() {
  totalCoins = 0;
  lives = 3;
  levels = createLevels();
  loadLevel(0);
  gameState = 'playing';
  hideOverlay();
}

// ============================================================
// 主循环
// ============================================================
function gameLoop() {
  requestAnimationFrame(gameLoop);
  frameCount++;

  // 屏幕震动
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * shakeIntensity;
    shakeY = (Math.random() - 0.5) * shakeIntensity;
    shakeIntensity *= 0.9;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (gameState === 'playing') {
    updatePlayer(player, currentLevelData);
    updateCamera(player, currentLevelData);
  }

  if (gameState === 'dead') {
    deathTimer++;
    if (deathTimer > 90) {
      if (lives <= 0) {
        gameState = 'gameOver';
        showOverlay('💀 游戏结束', `收集了 ${totalCoins} 枚金币`, '重新开始', startGame);
      } else {
        loadLevel(currentLevel);
        player.invincible = 60;
        gameState = 'playing';
      }
    }
  }

  if (gameState === 'levelComplete') {
    levelCompleteTimer++;
    // 烟花粒子
    if (levelCompleteTimer % 8 === 0) {
      const colors = ['#ff6b6b','#ffd700','#7df9ff','#b07cfc','#6abf4b'];
      spawnParticles(
        player.x + Math.random() * 100 - 50,
        player.y - 50 + Math.random() * 30,
        colors[Math.floor(Math.random() * colors.length)],
        12, 5
      );
    }
    if (levelCompleteTimer > 150) {
      if (currentLevel < levels.length - 1) {
        loadLevel(currentLevel + 1);
        gameState = 'playing';
      } else {
        gameState = 'gameComplete';
        showOverlay('🎉 恭喜通关！', `共收集 ${totalCoins} 枚金币`, '再来一次', startGame);
      }
    }
  }

  // 绘制
  if (currentLevelData) {
    drawBackground(camera, currentLevelData);
    currentLevelData.platforms.forEach(p => drawPlatform(p, camera));
    currentLevelData.spikes.forEach(s => drawSpike(s, camera));
    currentLevelData.coins.forEach(c => drawCoin(c, camera));
    drawFlag(currentLevelData.flag, camera);
    if (player && !player.dead) drawPlayer(player, camera);
    updateParticles();
    drawParticles(camera);

    // 关卡完成文字
    if (gameState === 'levelComplete' && levelCompleteTimer < 150) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 48px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const text = levelCompleteTimer > 120 ? '前往下一关...' : '关卡完成！';
      ctx.fillText(text, CANVAS_W/2, CANVAS_H/2);
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText(`金币: ${totalCoins}`, CANVAS_W/2, CANVAS_H/2 + 45);
    }

    // 死亡淡出
    if (gameState === 'dead') {
      const alpha = Math.min(deathTimer / 60, 0.6);
      ctx.fillStyle = `rgba(255,0,0,${alpha})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (deathTimer > 30) {
        ctx.fillText(lives > 0 ? `剩余生命: ${lives}` : '游戏结束', CANVAS_W/2, CANVAS_H/2);
      }
    }
  }

  ctx.restore();
}

// 响应式缩放
function resizeCanvas() {
  const maxW = window.innerWidth - 40;
  const maxH = window.innerHeight - 40;
  const scale = Math.min(maxW / CANVAS_W, maxH / CANVAS_H, 1);
  canvas.style.width = (CANVAS_W * scale) + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
  container.style.width = (CANVAS_W * scale) + 'px';
  container.style.height = (CANVAS_H * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 启动
gameLoop();
</script>
