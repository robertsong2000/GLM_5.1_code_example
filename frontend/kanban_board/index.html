<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拖拽看板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-light: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --accent-todo: #38bdf8;
    --accent-doing: #fbbf24;
    --accent-done: #4ade80;
    --card-bg: #1e293b;
    --card-hover: #263348;
    --placeholder-bg: rgba(56, 189, 248, 0.08);
    --placeholder-border: rgba(56, 189, 248, 0.4);
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-card: 0 2px 8px rgba(0,0,0,0.2);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(56,189,248,0.06), transparent),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(74,222,128,0.04), transparent);
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .board {
    display: flex;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
    align-items: flex-start;
  }

  /* ── Column ── */
  .column {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.3s;
  }

  .column.drag-over {
    box-shadow: 0 0 0 2px var(--placeholder-border), var(--shadow);
  }

  .column-header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .column[data-status="todo"]  .column-dot { background: var(--accent-todo); box-shadow: 0 0 8px var(--accent-todo); }
  .column[data-status="doing"] .column-dot { background: var(--accent-doing); box-shadow: 0 0 8px var(--accent-doing); }
  .column[data-status="done"]  .column-dot { background: var(--accent-done); box-shadow: 0 0 8px var(--accent-done); }

  .column-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .column-count {
    margin-left: auto;
    background: var(--surface-light);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 10px;
    min-width: 26px;
    text-align: center;
  }

  .card-list {
    padding: 12px;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.2s;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: grab;
    user-select: none;
    transition: transform 0.2s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.2s,
                opacity 0.2s,
                background 0.15s;
    position: relative;
  }

  .card:hover {
    background: var(--card-hover);
    box-shadow: var(--shadow-card);
    transform: translateY(-1px);
  }

  .card:active { cursor: grabbing; }

  .card.dragging {
    opacity: 0.35;
    transform: scale(0.97);
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
  }

  .card-tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }

  .card[data-priority="high"]   .card-tag { background: rgba(239,68,68,0.15); color: #f87171; }
  .card[data-priority="medium"] .card-tag { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .card[data-priority="low"]    .card-tag { background: rgba(74,222,128,0.15); color: #4ade80; }

  /* ── Placeholder ── */
  .placeholder {
    border: 2px dashed var(--placeholder-border);
    border-radius: 10px;
    background: var(--placeholder-bg);
    transition: height 0.2s cubic-bezier(0.22,1,0.36,1),
                opacity 0.15s;
    height: 52px;
    flex-shrink: 0;
    pointer-events: none;
  }

  .placeholder:first-child:last-child {
    height: 52px;
  }

  /* ── Drop animation ── */
  @keyframes card-drop {
    0%   { transform: scale(1.03); opacity: 0.8; }
    100% { transform: scale(1);    opacity: 1; }
  }

  .card.just-dropped {
    animation: card-drop 0.25s cubic-bezier(0.22,1,0.36,1);
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .board {
      flex-direction: column;
    }
    .column { max-width: 400px; margin: 0 auto; width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Kanban Board</h1>
  <p>拖拽卡片在列之间移动或重新排序</p>
</div>

<div class="board" id="board">
  <!-- Columns are rendered by JS -->
</div>

<script>
const INITIAL_DATA = {
  todo: [
    { id: 'card-a', title: '用户登录页面设计',      priority: 'high'   },
    { id: 'card-b', title: '数据库表结构评审',      priority: 'medium' },
    { id: 'card-c', title: '编写单元测试用例',      priority: 'low'    },
    { id: 'card-g', title: '接口文档更新',          priority: 'medium' },
  ],
  doing: [
    { id: 'card-d', title: '首页性能优化',          priority: 'high'   },
    { id: 'card-e', title: '消息推送功能开发',      priority: 'medium' },
  ],
  done: [
    { id: 'card-f', title: '项目环境搭建',          priority: 'low'    },
    { id: 'card-h', title: '代码规范配置 (ESLint)', priority: 'low'    },
  ],
};

const COLUMNS = [
  { status: 'todo',  label: 'To Do'  },
  { status: 'doing', label: 'Doing'  },
  { status: 'done',  label: 'Done'   },
];

const PRIORITY_LABEL = { high: '高优先', medium: '中优先', low: '低优先' };

/* ── State ── */
const state = JSON.parse(JSON.stringify(INITIAL_DATA));

/* ── Drag state ── */
let draggedCardId   = null;
let sourceStatus    = null;
let placeholder     = null;

/* ── DOM refs ── */
const board = document.getElementById('board');

/* ── Render helpers ── */
function createCardEl(card) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = card.id;
  el.dataset.priority = card.priority;
  el.innerHTML = `
    <div class="card-title">${card.title}</div>
    <span class="card-tag">${PRIORITY_LABEL[card.priority]}</span>
  `;
  return el;
}

function renderBoard() {
  board.innerHTML = '';
  for (const col of COLUMNS) {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.status = col.status;

    const cards = state[col.status];
    colEl.innerHTML = `
      <div class="column-header">
        <span class="column-dot"></span>
        <span class="column-title">${col.label}</span>
        <span class="column-count">${cards.length}</span>
      </div>
    `;

    const list = document.createElement('div');
    list.className = 'card-list';
    list.dataset.status = col.status;

    for (const card of cards) {
      list.appendChild(createCardEl(card));
    }

    colEl.appendChild(list);
    board.appendChild(colEl);
  }
  bindCardEvents();
}

function updateCount(status) {
  const col = board.querySelector(`.column[data-status="${status}"]`);
  if (!col) return;
  const count = col.querySelector('.column-count');
  const list = col.querySelector('.card-list');
  count.textContent = list.querySelectorAll('.card').length;
}

/* ── Placeholder management ── */
function createPlaceholder() {
  if (!placeholder) {
    placeholder = document.createElement('div');
    placeholder.className = 'placeholder';
  }
  return placeholder;
}

function removePlaceholder() {
  if (placeholder && placeholder.parentNode) {
    placeholder.parentNode.removeChild(placeholder);
  }
}

/* ── Find insertion index based on mouse Y ── */
function getInsertionBefore(listEl, y) {
  const cards = [...listEl.querySelectorAll('.card:not(.dragging)')];
  for (const card of cards) {
    const box = card.getBoundingClientRect();
    const midY = box.top + box.height / 2;
    if (y < midY) return card;
  }
  return null;  // append at end
}

/* ── Bind drag events on every card ── */
function bindCardEvents() {
  board.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend',   onDragEnd);
  });

  board.querySelectorAll('.card-list').forEach(list => {
    list.addEventListener('dragover',  onDragOver);
    list.addEventListener('dragenter', onDragEnter);
    list.addEventListener('dragleave', onDragLeave);
    list.addEventListener('drop',      onDrop);
  });
}

/* ── Drag handlers ── */
function onDragStart(e) {
  const card = e.currentTarget;
  draggedCardId = card.dataset.id;
  sourceStatus  = card.closest('.card-list').dataset.status;

  card.classList.add('dragging');

  /* Set drag image (slightly offset so cursor isn't on text) */
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedCardId);

  /* Delay adding placeholder so the drag image captures the card cleanly */
  requestAnimationFrame(() => {
    const ph = createPlaceholder();
    card.parentNode.insertBefore(ph, card);
  });
}

function onDragEnd(e) {
  const card = e.currentTarget;
  card.classList.remove('dragging');
  removePlaceholder();

  /* Reset column highlights */
  board.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));

  draggedCardId = null;
  sourceStatus  = null;
}

function onDragEnter(e) {
  e.preventDefault();
  const list = e.currentTarget;
  const col  = list.closest('.column');
  col.classList.add('drag-over');
}

function onDragLeave(e) {
  const list = e.currentTarget;
  /* Only remove highlight when truly leaving the column */
  const related = e.relatedTarget;
  if (!list.contains(related)) {
    list.closest('.column').classList.remove('drag-over');
  }
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  const list = e.currentTarget;
  const ph   = createPlaceholder();

  /* Skip if placeholder already correctly placed */
  if (ph.parentNode === list && ph.nextElementSibling === getInsertionBefore(list, e.clientY)) {
    return;
  }

  const before = getInsertionBefore(list, e.clientY);
  if (before) {
    list.insertBefore(ph, before);
  } else {
    list.appendChild(ph);
  }
}

function onDrop(e) {
  e.preventDefault();
  if (!draggedCardId) return;

  const list   = e.currentTarget;
  const target = list.dataset.status;

  /* Find placeholder position to determine insertion index */
  const ph   = createPlaceholder();
  const cards = [...list.querySelectorAll('.card:not(.dragging)')];
  const allChildren = [...list.children];
  const phIndex = allChildren.indexOf(ph);

  /* Remove placeholder */
  removePlaceholder();

  /* ── Update state ── */
  /* Remove card from source */
  const srcArr = state[sourceStatus];
  const cardIdx = srcArr.findIndex(c => c.id === draggedCardId);
  const [cardData] = srcArr.splice(cardIdx, 1);

  /* Determine target index (accounting for cards that were before placeholder) */
  let realCardsBeforePh = 0;
  for (let i = 0; i < phIndex; i++) {
    if (allChildren[i].classList.contains('card')) realCardsBeforePh++;
  }
  /* If same column and source idx < target, adjust */
  let insertIdx = realCardsBeforePh;
  if (sourceStatus === target && cardIdx < insertIdx) {
    insertIdx--;  // we already removed one element
  }

  state[target].splice(insertIdx, 0, cardData);

  /* ── Update DOM directly (avoid full re-render for smooth UX) ── */
  const draggedEl = board.querySelector(`.card[data-id="${draggedCardId}"]`);
  draggedEl.classList.remove('dragging');

  const targetCards = list.querySelectorAll('.card');
  if (insertIdx < targetCards.length && targetCards[insertIdx] !== draggedEl) {
    list.insertBefore(draggedEl, targetCards[insertIdx]);
  } else if (!list.contains(draggedEl)) {
    list.appendChild(draggedEl);
  }

  /* Ensure it's in the right position within the target list */
  const finalCards = [...list.querySelectorAll('.card')];
  const currentIdx = finalCards.indexOf(draggedEl);
  if (currentIdx !== insertIdx) {
    /* Reorder if needed */
    if (insertIdx < finalCards.length) {
      list.insertBefore(draggedEl, finalCards[insertIdx] > currentIdx ? finalCards[insertIdx + 1] || null : finalCards[insertIdx]);
    }
  }

  /* Drop animation */
  draggedEl.classList.add('just-dropped');
  draggedEl.addEventListener('animationend', () => draggedEl.classList.remove('just-dropped'), { once: true });

  /* Update counts */
  updateCount(sourceStatus);
  updateCount(target);

  /* Reset column highlights */
  board.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));

  /* Output new state */
  logState();

  draggedCardId = null;
  sourceStatus  = null;
}

/* ── Console output ── */
function logState() {
  const result = {};
  for (const col of COLUMNS) {
    result[col.label] = state[col.status].map(c => ({ id: c.id, title: c.title }));
  }
  console.log('%c📋 拖拽看板 — 最新排序结果', 'font-weight:bold;font-size:14px;color:#38bdf8;');
  console.table(
    Object.entries(result).flatMap(([col, cards]) =>
      cards.map((c, i) => ({ 列: col, 序号: i + 1, ID: c.id, 标题: c.title }))
    )
  );
  console.log('完整状态:', JSON.parse(JSON.stringify(state)));
}

/* ── Init ── */
renderBoard();
logState();
</script>

</body>
</html>
