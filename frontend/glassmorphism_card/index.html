<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Card</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* ===== Animated gradient background ===== */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}

.bg::before,
.bg::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.7;
  animation: float 8s ease-in-out infinite alternate;
}

.bg::before {
  width: 400px;
  height: 400px;
  top: -100px;
  left: -50px;
  background: radial-gradient(circle, #7f5af0, #6b21a8);
}

.bg::after {
  width: 350px;
  height: 350px;
  bottom: -80px;
  right: -30px;
  background: radial-gradient(circle, #2cb67d, #0ea5e9);
  animation-delay: -4s;
}

@keyframes float {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(60px, 40px) scale(1.15); }
}

/* ===== Card Container (provides perspective) ===== */
.card-wrapper {
  perspective: 1000px;
  z-index: 1;
}

/* ===== The Glass Card ===== */
.card {
  position: relative;
  width: 360px;
  padding: 40px 32px 32px;
  border-radius: 24px;

  /* Glassmorphism */
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.18);

  /* Smooth 3D transition */
  transform-style: preserve-3d;
  transition: transform 0.15s ease-out, box-shadow 0.3s ease;
  will-change: transform;
}

.card:hover {
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.35),
    0 0 60px rgba(127, 90, 240, 0.15);
}

/* ===== Mouse-follow light overlay ===== */
.card .light {
  position: absolute;
  inset: 0;
  border-radius: 24px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 10;
  mix-blend-mode: soft-light;
}

.card:hover .light {
  opacity: 1;
}

/* ===== Avatar ===== */
.avatar-ring {
  width: 90px;
  height: 90px;
  margin: 0 auto 20px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, #7f5af0, #2cb67d);
  transform: translateZ(40px);
}

.avatar {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: #fff;
  user-select: none;
}

/* ===== Info ===== */
.name {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #e2e8f0;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  transform: translateZ(30px);
}

.title {
  text-align: center;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.55);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 24px;
  transform: translateZ(25px);
}

/* ===== Divider ===== */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  margin-bottom: 24px;
}

/* ===== Stats ===== */
.stats {
  display: flex;
  justify-content: space-around;
  margin-bottom: 24px;
  transform: translateZ(20px);
}

.stat {
  text-align: center;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
}

.stat-label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.45);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-top: 2px;
}

/* ===== Social Icons ===== */
.socials {
  display: flex;
  justify-content: center;
  gap: 16px;
  transform: translateZ(30px);
}

.social-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s, transform 0.2s;
}

.social-btn:hover {
  background: rgba(255, 255, 255, 0.15);
  border-color: rgba(255, 255, 255, 0.3);
  transform: translateY(-3px);
}

.social-btn svg {
  width: 18px;
  height: 18px;
  fill: rgba(255, 255, 255, 0.7);
  transition: fill 0.3s;
}

.social-btn:hover svg {
  fill: #fff;
}

/* ===== Shine sweep on hover (pure CSS) ===== */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 24px;
  background: linear-gradient(
    105deg,
    transparent 40%,
    rgba(255, 255, 255, 0.06) 45%,
    rgba(255, 255, 255, 0.12) 50%,
    rgba(255, 255, 255, 0.06) 55%,
    transparent 60%
  );
  background-size: 200% 100%;
  background-position: 100% 0;
  pointer-events: none;
  z-index: 5;
  transition: background-position 0.6s ease;
}

.card:hover::after {
  background-position: -100% 0;
}
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg"></div>

<!-- Card -->
<div class="card-wrapper">
  <div class="card" id="card">
    <!-- Mouse-follow light -->
    <div class="light" id="light"></div>

    <div class="avatar-ring">
      <div class="avatar">Z</div>
    </div>

    <div class="name">Zhang Wei</div>
    <div class="title">Senior Frontend Engineer</div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">128</div>
        <div class="stat-label">Projects</div>
      </div>
      <div class="stat">
        <div class="stat-value">3.2k</div>
        <div class="stat-label">Followers</div>
      </div>
      <div class="stat">
        <div class="stat-value">86</div>
        <div class="stat-label">Stars</div>
      </div>
    </div>

    <div class="socials">
      <!-- GitHub -->
      <div class="social-btn">

      </div>
      <!-- Twitter / X -->
      <div class="social-btn">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </div>
      <!-- LinkedIn -->
      <div class="social-btn">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </div>
      <!-- Email -->
      <div class="social-btn">
        <svg viewBox="0 0 24 24"><path d="M1.5 8.67v8.58a3 3 0 003 3h15a3 3 0 003-3V8.67l-8.928 5.493a3 3 0 01-3.144 0L1.5 8.67z"/><path d="M22.5 6.908V6.75a3 3 0 00-3-3h-15a3 3 0 00-3 3v.158l9.714 5.978a1.5 1.5 0 001.572 0L22.5 6.908z"/></svg>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const card = document.getElementById('card');
  const light = document.getElementById('light');
  const wrapper = card.parentElement;

  // Maximum rotation in degrees
  const MAX_ROTATION = 15;

  /**
   * Handle mousemove: compute 3D tilt + light position
   */
  function handleMouseMove(e) {
    const rect = card.getBoundingClientRect();
    // Normalized position from center: -0.5 to 0.5
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;

    // 3D tilt: moving mouse left => card rotates right around Y axis
    const rotateY = x * MAX_ROTATION * 2;
    const rotateX = -y * MAX_ROTATION * 2;

    card.style.transform =
      `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

    // Mouse-follow radial light
    const px = ((e.clientX - rect.left) / rect.width) * 100;
    const py = ((e.clientY - rect.top) / rect.height) * 100;

    light.style.background =
      `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.25) 0%, transparent 60%)`;
  }

  /**
   * Reset on mouse leave
   */
  function handleMouseLeave() {
    card.style.transform = 'rotateX(0) rotateY(0)';
    light.style.opacity = '0';
  }

  card.addEventListener('mousemove', handleMouseMove);
  card.addEventListener('mouseleave', handleMouseLeave);
})();
</script>
</body>
</html>
